[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "codex-agent-orchestration"
version = "0.1.0"
description = "Codex-based multi-agent orchestration MVP"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.85,<1",
]

[project.scripts]
orchestrator = "codex_orchestrator.cli:main"

[dependency-groups]
dev = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv]
package = true
default-groups = ["dev"]
